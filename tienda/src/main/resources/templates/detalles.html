<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Detalles de Pedidos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f3d2e, #1f7a63, #3dbb8b);
            color: #333;
            padding: 20px;
        }

        .titulo {
            text-align: center;
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: #d7f5ea;
            margin-bottom: 30px;
        }

        .toolbar {
            text-align: right;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .boton-nuevo {
            background: linear-gradient(135deg, #00c853, #64dd17);
        }

        .boton-editar {
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
        }

        .boton-eliminar {
            background: linear-gradient(135deg, #c62828, #ef5350);
        }

        .boton-cancelar {
            background: linear-gradient(135deg, #546e7a, #90a4ae);
        }

        .boton-crear {
            background: linear-gradient(135deg, #00c853, #00e676);
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .tarjeta-tabla {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #1b5e20, #43a047);
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f1f8f6;
        }

        tbody tr:hover {
            background-color: #d0f0e6;
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .campo {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #2e7d32;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .overlay:target {
            display: flex;
        }

        .overlay > div {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mensaje-error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        .modal-acciones {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .confirm-msg {
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<h1>Tabla de Detalles de Pedidos</h1>
<div class="toolbar">
    <a href="#modalCrear"  class="btn btn-agregar">Agregar Detalle</a>
    <a href="/home" class="btn">Volver a Inicio</a>
</div>

<table>
    <thead>
    <tr>
        <th>No.</th>
        <th>Cantidad</th>
        <th>Precio Unitario</th>
        <th>Pedido</th>
        <th>Producto</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="detalles:${detalle}">
        <td th:text="${detalles.idDetalle}"></td>
        <td th:text="${detalles.cantidadPedido}"></td>
        <td th:text="${detalles.precioUnitario}"></td>
        <td th:text="${detalles.idPedido}"></td>
        <td th:text="${detalles.idProducto}"></td>
        <td>
            <a th:href="@{/detalles/editar/{id}(id=${detalles.idDetalle})}" class="btn boton-editar">Editar</a>
            <a th:href="@{/detalles/eliminar/{id}(id=${detalles.idDetalle})}" class="btn boton-eliminar">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

<div id="modalCrear" class="overlay" th:style="${mostrarModalCrear} ? 'display:flex;' : ''">
    <div class="modal">
        <h2>Nuevo Detalle</h2>
        <form th:action="@{/detalles/crear}" th:object="${nuevoDetalle}" method="post">
            <div class="campo">
                <label>Cantidad</label>
                <input type="number" th:field="*{cantidadPedido}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('cantidadPedido')}"
                     th:errors="*{cantidadPedido}">

                </div>
            </div>
            <div class="campo">
                <label>Precio Unitario</label>
                <input type="number" th:field="*{precioUnitario}" placeholder="0.00"  step="0.01" min="0"  required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('precioUnitario')}"
                     th:errors="*{precioUnitario}">
                </div>
            </div>
            <div class="campo">
                <label>Pedido</label>
                <input type="number" th:field="*{idPedido}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('idPedido')}"
                     th:errors="*{idPedido}">
                </div>
            </div>
            <div class="campo">
                <label>Producto</label>
                <input type="number" th:field="*{idProducto}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('idProducto')}"
                     th:errors="*{idProducto}">
                </div>
            </div>
            <div class="modal-acciones">
                <a href="/detalles" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-crear">Guardar</button>
            </div>
        </form>
    </div>
</div>


<div  th:if="${detalleAEditar != null}" id="modalEditar" class="overlay"
      style= "display:flex;">
    <div class="modal">
        <h2>Editar Producto</h2>
        <form th:action="@{/detalles/editar/{id}(id=${detalleAEditar.idDetalle})}" th:object="${detalleAEditar}" method="post">
            <div class="campo">
                <label>Cantidad</label>
                <input type="number" th:field="*{cantidadPedido}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('cantidadPedido')}"
                     th:errors="*{cantidadPedido}">

                </div>
            </div>
            <div class="campo">
                <label>Precio Unitario</label>
                <input type="number" th:field="*{precioUnitario}" placeholder="0.00"  step="0.01" min="0"  required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('precioUnitario')}"
                     th:errors="*{precioUnitario}">
                </div>
            </div>
            <div class="campo">
                <label>Pedido</label>
                <input type="number" th:field="*{idPedido}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('idPedido')}"
                     th:errors="*{idPedido}">
                </div>
            </div>
            <div class="campo">
                <label>Producto</label>
                <input type="number" th:field="*{idProducto}" placeholder="0" required>
                <div class="mensaje-error"
                     th:if="${#fields.hasErrors('idProducto')}"
                     th:errors="*{idProducto}">
                </div>
            </div>
            <div class="modal-acciones">
                <a href="/detalles" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-crear">Guardar</button>
            </div>
        </form>
    </div>
</div>


<div th:if="${detalleAEliminar != null}" id="modalEliminar" class="overlay" style="display:flex;">
    <div class="modal">
        <h2>Eliminar Detalle</h2>
        <p>¿Eliminar el detalle: <strong th:text="${detalleAEliminar.idDetalle}"></strong>?
            Esta acción no puede ser revertida</p>
        <form th:action="@{/detalles/eliminar/{id}(id=${detalleAEliminar.idDetalle})}" method="post">
            <div>
                <a href="/detalles" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-eliminar">Eliminar</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
